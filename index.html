<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>비열과 열팽창 가상실험실</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 antialiased">
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useMemo } = React;

  /* ── 아이콘 ─────────────────────────────────────────── */
  const Ic = (d, extra='') => ({c}) =>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      className={c} dangerouslySetInnerHTML={{__html:d}}/>;

  const IconFlame   = Ic('<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>');
  const IconPlay    = Ic('<polygon points="5 3 19 12 5 21 5 3"/>');
  const IconStop    = Ic('<rect width="18" height="18" x="3" y="3" rx="2"/>');
  const IconDrop    = Ic('<path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 2.9 7 2.9s-2.29 6.16-2.29 6.16C3.57 10 3 11.08 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/>');
  const IconLayers  = Ic('<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/>');
  const IconRotate  = Ic('<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>');
  const IconHelp    = Ic('<circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/>');
  const IconCheck   = Ic('<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>');
  const IconXCirc   = Ic('<circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>');
  const IconWind    = Ic('<path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/>');
  const IconBook    = Ic('<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>');
  const IconSave    = Ic('<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>');
  const IconTrash   = Ic('<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>');
  const IconPencil  = Ic('<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>');
  // 입자 운동 관찰 전용 아이콘 (원자 모양)
  const IconAtom    = Ic('<circle cx="12" cy="12" r="1"/><path d="M20.2 20.2c2.04-2.03.02-7.36-4.5-11.9C11.18 3.77 5.84 1.75 3.8 3.8"/><path d="m3.8 20.2c2.04 2.03 7.37.02 11.9-4.5 4.54-4.53 6.56-9.87 4.5-11.9"/>');

  /* ── 전역 CSS ────────────────────────────────────────── */
  const GlobalStyles = () => (
    <style>{`
      @keyframes vibrate {
        0%   { transform:translate(0,0); }
        25%  { transform:translate(var(--vx), var(--vy)); }
        50%  { transform:translate(calc(var(--vx)*-1), calc(var(--vy)*-.5)); }
        75%  { transform:translate(calc(var(--vx)*.5), calc(var(--vy)*-1)); }
        100% { transform:translate(0,0); }
      }
      @keyframes fadeIn  { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
      @keyframes floatY  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
      .particle   { animation:vibrate var(--spd,.4s) infinite linear; }
      .fade-in    { animation:fadeIn .2s ease both; }
      .float-anim { animation:floatY 2.8s ease-in-out infinite; }
      .scrollbar-hide::-webkit-scrollbar{display:none}
      .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
      select{appearance:auto}
    `}</style>
  );

  /* ── 상수 ────────────────────────────────────────────── */
  const MATS = {
    water : {name:'물',     c:4.18, color:'#3B82F6'},
    oil   : {name:'식용유', c:2.0,  color:'#FBBF24'},
    sand  : {name:'모래',   c:0.84, color:'#D97706'},
  };
  const SAVED_COLORS = ['#EF4444','#10B981','#8B5CF6','#F97316','#06B6D4'];

  /* ── 탐구 질문 카드 ──────────────────────────────────── */
  const InquiryCard = ({qs}) => (
    <div className="mt-4 bg-amber-50 border border-amber-200 rounded-xl p-3.5">
      <p className="text-amber-800 font-bold text-xs mb-2">🔍 탐구 질문</p>
      <ul className="space-y-1.5">
        {qs.map((q,i)=><li key={i} className="text-amber-700 text-xs leading-relaxed">• {q}</li>)}
      </ul>
    </div>
  );

  /* ══════════════════════════════════════════════════════
     입자 운동 관찰 컴포넌트
     ─ SVG는 160×160 채워 배치, 원형 클리핑과 정확히 일치
     ══════════════════════════════════════════════════════ */
  const SZ = 160;          // 내부 뷰 크기(px) – border 제외 실제 표시 영역
  const CX = 80, CY = 80;  // 원 중심
  const PR = 70;           // 입자 배치 허용 반지름

  // 원 안에 n개 점 균등 랜덤 배치 (거부 샘플링)
  const circlePoints = (n, r=PR) => {
    const pts=[]; let tries=0;
    while(pts.length<n && tries<3000){
      const x=CX+(Math.random()*2-1)*r;
      const y=CY+(Math.random()*2-1)*r;
      if((x-CX)**2+(y-CY)**2<r*r) pts.push({x,y});
      tries++;
    }
    return pts;
  };

  const ParticleViewer = ({temperature, matterType}) => {
    const diff  = temperature - 20;
    const amp   = Math.max(0.5, 1 + diff*0.045);
    const spd   = Math.max(0.06, 0.55 - diff*0.004);
    const color = temperature>40 ? '#EF4444' : temperature<15 ? '#60A5FA' : '#8B5CF6';

    // 기본 위치: 물질 유형 변경 시만 재계산
    const basePts = useMemo(()=>{
      if(matterType==='solid'){
        const sp=24;
        return Array.from({length:16},(_,i)=>({
          x: CX+((i%4)-1.5)*sp,
          y: CY+(Math.floor(i/4)-1.5)*sp,
        }));
      } else if(matterType==='liquid'){
        return circlePoints(16, 65);
      } else {
        // 기체: 적은 수, 더 넓게
        return circlePoints(9, 68);
      }
    },[matterType]);

    // 진동 오프셋: 온도 바뀔 때 재계산
    const vibOff = useMemo(()=>
      basePts.map(()=>({
        vx:`${(Math.random()-.5)*amp*8}px`,
        vy:`${(Math.random()-.5)*amp*8}px`,
      })),
    [temperature, matterType]);

    // 고체: 중심에서 방사형 간격 확대
    const scale = matterType==='solid' ? 1+diff*0.0045 : 1;

    const typeLabel  = matterType==='solid'?'규칙적 격자(고체)':matterType==='liquid'?'불규칙 배치(액체)':'넓게 퍼짐(기체)';
    const motionLbl  = diff>0?'활발함 ↑':diff<0?'둔해짐 ↓':'보통';
    const stateTitle = diff>0?'가열 → 팽창':diff<0?'냉각 → 수축':'상온 상태';
    const stateDesc  = diff>0
      ? '입자들이 더 활발히 움직이며 서로 간격이 멀어져 전체 부피가 커집니다.'
      : diff<0
        ? '입자들의 운동이 둔해지며 간격이 가까워져 전체 부피가 줄어듭니다.'
        : '입자들이 일정한 간격으로 진동하며 기본 상태를 유지합니다.';

    return (
      <div className="flex flex-col items-center w-full">
        {/* ★ 수정: 외부 div(border ring) + 내부 div(overflow:hidden, border-radius)를 분리
            → SVG가 내부 div의 (0,0)부터 정확히 배치되므로 원형 클리핑 중심이 올바름 */}
        <div className="relative mb-4" style={{width:SZ+16+'px', height:SZ+16+'px'}}>
          {/* border ring (시각용, 클리핑에 영향 없음) */}
          <div className="absolute inset-0 rounded-full border-8 border-gray-300 pointer-events-none" style={{zIndex:2}}/>
          {/* 실제 클리핑 영역 – border 없음, overflow:hidden */}
          <div className="absolute rounded-full bg-white shadow-inner overflow-hidden"
            style={{inset:'8px', zIndex:1}}>
            <svg viewBox={`0 0 ${SZ} ${SZ}`} width={SZ} height={SZ}>
              {basePts.map((p,i)=>{
                const cx = CX+(p.x-CX)*scale;
                const cy = CY+(p.y-CY)*scale;
                return (
                  <circle key={i} cx={cx} cy={cy}
                    r={matterType==='gas'?7:8}
                    fill={color} opacity="0.9"
                    className="particle"
                    style={{'--vx':vibOff[i]?.vx||'2px','--vy':vibOff[i]?.vy||'2px','--spd':`${spd}s`}}/>
                );
              })}
            </svg>
          </div>
        </div>
        <div className="w-full bg-white p-3 rounded-xl shadow-sm border-l-4 border-indigo-400">
          <p className="font-bold text-indigo-700 text-xs mb-1">📝 관찰: {stateTitle}</p>
          <p className="text-gray-600 text-xs leading-relaxed">{stateDesc}</p>
          <div className="mt-2 flex flex-wrap gap-1.5 text-xs">
            <span className="bg-gray-100 px-2 py-0.5 rounded text-gray-600">온도: {temperature}°C</span>
            <span className="bg-gray-100 px-2 py-0.5 rounded text-gray-600">{typeLabel}</span>
            <span className="bg-gray-100 px-2 py-0.5 rounded text-gray-600">운동: {motionLbl}</span>
          </div>
        </div>
      </div>
    );
  };

  /* 입자 운동 패널 (버튼 + 뷰어, 재사용) */
  const ParticlePanel = ({temperature, matterType, accentCls, emptyIcon, show, onToggle}) => (
    <div className="flex-1 p-5 rounded-2xl shadow-sm border flex flex-col items-center justify-start"
      style={{background:'rgba(255,255,255,0.6)'}}>
      <button onClick={onToggle}
        className={`mb-4 flex items-center px-5 py-2.5 rounded-full font-bold shadow-md transition-all hover:scale-105 text-sm ${show?'bg-gray-600 text-white':accentCls}`}>
        <IconAtom c="mr-2 w-4 h-4"/>
        {show?'관찰 종료':'입자 운동 관찰하기'}
      </button>
      {show
        ? <div className="fade-in w-full flex flex-col items-center"><ParticleViewer temperature={temperature} matterType={matterType}/></div>
        : <div className="flex flex-col items-center justify-center flex-1 w-full min-h-[180px] border-2 border-dashed rounded-xl bg-white/50 p-4 text-center opacity-50">
            {emptyIcon}
            <p className="text-sm mt-2 text-gray-500">버튼을 눌러 입자 운동을 관찰하세요</p>
          </div>}
    </div>
  );

  /* ══════════════════════════════════════════════════════
     탭 1: 비열 실험
     ══════════════════════════════════════════════════════ */
  const SpecificHeatTab = () => {
    const [mat1,setMat1]=useState('water');
    const [mat2,setMat2]=useState('sand');
    const [m1,setM1]=useState(100);
    const [m2,setM2]=useState(100);
    const [htg,setHtg]=useState(false);
    const [time,setTime]=useState(0);
    const [series,setSeries]=useState([{time:0,t1:20,t2:20}]);
    const [saved,setSaved]=useState([]);
    const [viewSaved,setViewSaved]=useState(null); // 상세보기할 저장 결과 id
    const HEAT=200; // J/s

    const reset=()=>{setHtg(false);setTime(0);setSeries([{time:0,t1:20,t2:20}]);};

    useEffect(()=>{
      if(!htg) return;
      const id=setInterval(()=>{
        setTime(t=>{
          const nt=t+1;
          const T1=20+(HEAT*nt)/(MATS[mat1].c*1000*(m1/1000));
          const T2=20+(HEAT*nt)/(MATS[mat2].c*1000*(m2/1000));
          // 온도를 제한하지 않고 그대로 저장 (그래프 그릴 때 90도에서 멈추도록 처리)
          setSeries(p=>[...p,{time:nt,t1:T1,t2:T2}]);
          if(T1>=90&&T2>=90) setHtg(false);
          return nt;
        });
      },100);
      return ()=>clearInterval(id);
    },[htg,mat1,mat2,m1,m2]);

    const last=series[series.length-1];
    const t1=last.t1, t2=last.t2;
    const maxT=Math.max(300,time+20);
    // UI의 온도계는 20도에서 90도 범위를 0%~100%로 매핑
    const pct=v=>Math.max(0,Math.min(100,((v-20)/70)*100));
    
    // 계산 표시 및 온도계용 값 (90도 이상 오르지 않도록 고정)
    const dispT1 = Math.min(t1, 90);
    const dispT2 = Math.min(t2, 90);
    const dT1=(dispT1-20).toFixed(1), dT2=(dispT2-20).toFixed(1);
    const Q1=(MATS[mat1].c*(m1/1000)*(dispT1-20)).toFixed(3);
    const Q2=(MATS[mat2].c*(m2/1000)*(dispT2-20)).toFixed(3);
    const same=mat1===mat2;

    const saveResult=()=>{
      if(series.length<=1) return;
      const ci=saved.length%SAVED_COLORS.length;
      setSaved(p=>[...p,{
        id:Date.now(),
        label:`${MATS[mat1].name}(${m1}g) vs ${MATS[mat2].name}(${m2}g)`,
        data:[...series],
        c1:SAVED_COLORS[ci], c2:SAVED_COLORS[(ci+2)%SAVED_COLORS.length],
      }]);
    };

    // 그래프 그리기 도우미 함수: 90도까지만 그리고 멈춤 (수평선 방지)
    const getPoints = (data, key) => {
      const pts = [];
      let prev = null;
      for (let d of data) {
        const yVal = d[key];
        if (yVal >= 90) {
          let exactTime = d.time;
          if (prev && prev[key] < 90) {
            // 90도에 정확히 도달하는 시간을 비례식을 통해 계산
            const slope = (yVal - prev[key]) / (d.time - prev.time);
            exactTime = prev.time + (90 - prev[key]) / slope;
          }
          pts.push(`${exactTime},${80-((90-20)/70)*78}`);
          break; // 90도에 도달하면 더 이상 선을 그리지 않음
        }
        pts.push(`${d.time},${80-((yVal-20)/70)*78}`);
        prev = d;
      }
      return pts.join(' ');
    };

    return (
      <div className="flex flex-col gap-3 fade-in">
        {same&&<div className="bg-yellow-50 border border-yellow-300 rounded-xl px-4 py-2 text-yellow-800 text-xs font-medium">
          ⚠️ 같은 물질을 선택하면 그래프가 겹쳐 비교가 의미 없습니다. 서로 다른 물질을 선택하세요.
        </div>}

        <div className="flex flex-col md:flex-row gap-3">
          {/* ── 가열 장치 ── */}
          <div className="flex-1 bg-white p-3 md:p-4 rounded-2xl shadow-sm border border-blue-100 flex flex-col items-center">
            <h3 className="text-sm font-bold text-gray-700 mb-2 flex items-center">
              <IconFlame c="text-orange-500 mr-2 w-4 h-4"/> 가열 장치
            </h3>
            <p className="text-xs text-gray-400 mb-3 bg-gray-50 px-3 py-1.5 rounded-lg border">
              공급 열량: <strong className="text-gray-600">200 J/초</strong>로 두 물질을 동시에 가열
            </p>

            <div className="flex w-full justify-around mb-3 gap-2 flex-wrap">
              {[
                {key:'A',mat:mat1,setM:setMat1,mass:m1,setMass:setM1,cur:dispT1,bg:'bg-blue-50',acc:'accent-blue-500',Q:Q1,dT:dT1},
                {key:'B',mat:mat2,setM:setMat2,mass:m2,setMass:setM2,cur:dispT2,bg:'bg-rose-50',acc:'accent-rose-500',Q:Q2,dT:dT2},
              ].map(({key,mat,setM,mass,setMass,cur,bg,acc,Q,dT})=>(
                <div key={key} className={`flex flex-col items-center ${bg} p-2 rounded-xl w-32 sm:w-36 shadow-inner`}>
                  <p className="text-xs font-bold text-gray-500 mb-1">물질 {key}</p>
                  <select className="mb-1 p-1 rounded-lg border border-gray-300 w-full text-center font-bold text-xs bg-white"
                    disabled={htg||time>0} value={mat} onChange={e=>setM(e.target.value)}>
                    {Object.entries(MATS).map(([k,v])=><option key={k} value={k}>{v.name}</option>)}
                  </select>
                  <div className="text-[11px] text-indigo-600 mb-1 font-semibold">c = {MATS[mat].c}</div>
                  <div className="text-[11px] text-gray-500 mb-1">질량: {mass} g</div>
                  <input type="range" min="50" max="200" step="10" value={mass}
                    disabled={htg||time>0} onChange={e=>setMass(Number(e.target.value))}
                    className={`w-full mb-2 h-1.5 ${acc}`}/>
                  <div className="relative w-16 h-20 border-4 border-t-0 border-gray-300 rounded-b-lg overflow-hidden flex items-end bg-white/60">
                    <div className="w-full absolute bottom-0 opacity-75 transition-all duration-300"
                      style={{height:`${mass/2}%`,backgroundColor:MATS[mat].color}}/>
                    <div className="absolute top-1.5 left-1/2 -translate-x-1/2 w-2 h-16 bg-gray-100 rounded-full border border-gray-300 flex flex-col justify-end p-px">
                      <div className="w-full bg-red-500 rounded-full transition-all duration-200"
                        style={{height:`${pct(cur)}%`}}/>
                    </div>
                    <div className="absolute -top-5 left-1/2 -translate-x-1/2 text-[10px] font-bold text-gray-700 bg-white/90 px-1 py-0.5 rounded shadow-sm border border-gray-200 whitespace-nowrap">
                      {cur.toFixed(1)}°C
                    </div>
                  </div>
                </div>
              ))}
            </div>

            <div className="w-full bg-indigo-50 rounded-xl p-2.5 mb-3 border border-indigo-100">
              <p className="text-indigo-700 font-bold text-xs mb-1.5">📐 Q = m × c × ΔT 실시간 계산</p>
              <div className="grid grid-cols-2 gap-1.5">
                {[{lbl:'물질 A',mat:mat1,mass:m1,dT:dT1,Q:Q1},{lbl:'물질 B',mat:mat2,mass:m2,dT:dT2,Q:Q2}].map(({lbl,mat,mass,dT,Q})=>(
                  <div key={lbl} className="bg-white rounded-lg p-1.5 border border-indigo-100">
                    <p className="font-bold text-indigo-600 text-[11px]">{lbl}: {MATS[mat].name}</p>
                    <p className="text-gray-500 text-[11px]">m = {(mass/1000).toFixed(3)} kg</p>
                    <p className="text-gray-500 text-[11px]">c = {MATS[mat].c}</p>
                    <p className="text-gray-500 text-[11px]">ΔT = {dT}°C</p>
                    <p className="text-indigo-700 font-bold text-[11px] mt-0.5 pt-0.5 border-t border-indigo-50">Q ≈ {Q} kJ</p>
                  </div>
                ))}
              </div>
            </div>

            <div className="flex flex-wrap justify-center gap-1.5">
              <button onClick={()=>setHtg(true)} disabled={htg}
                className={`flex items-center px-3 py-1.5 rounded-full font-bold text-xs shadow-md transition-all ${!htg?'bg-orange-500 hover:bg-orange-600 text-white':'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                <IconPlay c="mr-1 w-3.5 h-3.5"/> 가열 시작
              </button>
              <button onClick={()=>setHtg(false)} disabled={!htg}
                className={`flex items-center px-3 py-1.5 rounded-full font-bold text-xs shadow-md transition-all ${htg?'bg-gray-700 hover:bg-gray-800 text-white':'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                <IconStop c="mr-1 w-3.5 h-3.5"/> 중지
              </button>
              <button onClick={saveResult} disabled={series.length<=1||htg}
                className={`flex items-center px-3 py-1.5 rounded-full font-bold text-xs shadow-md transition-all ${series.length>1&&!htg?'bg-emerald-500 hover:bg-emerald-600 text-white':'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                <IconSave c="mr-1 w-3.5 h-3.5"/> 결과 저장
              </button>
              <button onClick={reset}
                className="flex items-center bg-blue-100 hover:bg-blue-200 text-blue-800 px-3 py-1.5 rounded-full font-bold text-xs shadow-md transition-all">
                <IconRotate c="mr-1 w-3.5 h-3.5"/> 초기화
              </button>
            </div>
            {htg&&<div className="mt-2 flex justify-center gap-1.5">
              <div className="w-4 h-4 bg-orange-400 rounded-full animate-bounce opacity-80 blur-[1px]"/>
              <div className="w-5 h-5 bg-red-500 rounded-full animate-bounce delay-75 opacity-80 blur-[1px]"/>
              <div className="w-4 h-4 bg-yellow-400 rounded-full animate-bounce delay-150 opacity-80 blur-[1px]"/>
            </div>}
          </div>

          {/* ── 그래프 ── */}
          <div className="flex-1 bg-white p-3 md:p-4 rounded-2xl shadow-sm border border-blue-100 flex flex-col">

            {/* 저장 결과 상세보기 모달 */}
            {viewSaved&&(()=>{
              const s=saved.find(x=>x.id===viewSaved);
              if(!s) return null;
              const sMaxT=Math.max(300, s.data[s.data.length-1].time+20);
              // 저장 결과에서 레이블 파싱 (예: "물(100g) vs 모래(100g)")
              return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4">
                  <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-5 flex flex-col gap-3">
                    <div className="flex items-center justify-between">
                      <h3 className="text-sm font-bold text-indigo-700 flex items-center gap-2">
                        <IconLayers c="w-4 h-4 text-indigo-500"/> 저장 결과 상세보기
                      </h3>
                      <button onClick={()=>setViewSaved(null)}
                        className="text-gray-400 hover:text-gray-700 text-lg font-bold leading-none">✕</button>
                    </div>

                    <div className="bg-indigo-50 rounded-xl px-3 py-2 text-xs text-indigo-800 font-semibold">
                      {s.label}
                    </div>

                    {/* 상세 그래프 */}
                    <div className="flex min-h-[200px] gap-0">
                      <div className="flex flex-col justify-between text-right pr-1.5 py-0.5 shrink-0" style={{width:'32px'}}>
                        <span className="text-xs text-gray-500 font-semibold">90°C</span>
                        <span className="text-xs text-gray-400">70°C</span>
                        <span className="text-xs text-gray-400">50°C</span>
                        <span className="text-xs text-gray-400">30°C</span>
                        <span className="text-xs text-gray-500 font-semibold">20°C</span>
                      </div>
                      <div className="flex-1 relative border-l-2 border-b-2 border-gray-400 bg-gray-50 rounded-tr-lg overflow-hidden">
                        <svg className="w-full h-full" viewBox={`0 0 ${sMaxT} 80`} preserveAspectRatio="none">
                          <line x1="0" y1="16" x2={sMaxT} y2="16" stroke="#e5e7eb" strokeDasharray="3"/>
                          <line x1="0" y1="32" x2={sMaxT} y2="32" stroke="#e5e7eb" strokeDasharray="3"/>
                          <line x1="0" y1="48" x2={sMaxT} y2="48" stroke="#e5e7eb" strokeDasharray="3"/>
                          <line x1="0" y1="64" x2={sMaxT} y2="64" stroke="#e5e7eb" strokeDasharray="3"/>
                          <polyline fill="none" stroke={s.c1} strokeWidth="2.5"
                            points={getPoints(s.data,'t1')}/>
                          <polyline fill="none" stroke={s.c2} strokeWidth="2.5" strokeDasharray="5,3"
                            points={getPoints(s.data,'t2')}/>
                        </svg>
                      </div>
                    </div>
                    <div className="text-right text-xs text-gray-400 -mt-1 pr-1">→ 시간</div>

                    {/* 범례 */}
                    <div className="flex flex-wrap gap-2 justify-center">
                      {[{c:s.c1,lbl:'물질 A',dash:false},{c:s.c2,lbl:'물질 B',dash:true}].map(({c,lbl,dash})=>(
                        <div key={lbl} className="flex items-center bg-gray-50 px-2.5 py-1 rounded-md border border-gray-100">
                          <svg width="20" height="10" className="mr-1.5">
                            <line x1="0" y1="5" x2="20" y2="5" stroke={c} strokeWidth="2.5"
                              strokeDasharray={dash?'5,3':undefined}/>
                          </svg>
                          <span className="text-xs font-bold text-gray-700">{lbl}</span>
                        </div>
                      ))}
                    </div>

                    {/* 최종 온도 요약 */}
                    <div className="grid grid-cols-2 gap-2">
                      {[{key:'t1',c:s.c1,lbl:'물질 A'},{key:'t2',c:s.c2,lbl:'물질 B'}].map(({key,c,lbl})=>{
                        const finalT=Math.min(s.data[s.data.length-1][key],90);
                        return (
                          <div key={key} className="bg-gray-50 rounded-xl p-2.5 border border-gray-100 text-center">
                            <div className="text-xs font-bold mb-1" style={{color:c}}>{lbl}</div>
                            <div className="text-lg font-bold text-gray-800">{finalT.toFixed(1)}°C</div>
                            <div className="text-xs text-gray-400">최종 온도</div>
                            <div className="text-xs text-gray-500 mt-0.5">ΔT = {(finalT-20).toFixed(1)}°C</div>
                          </div>
                        );
                      })}
                    </div>

                    <div className="flex gap-2 justify-end mt-1">
                      <button onClick={()=>{setSaved(p=>p.filter(x=>x.id!==viewSaved));setViewSaved(null);}}
                        className="flex items-center gap-1 text-xs text-red-400 hover:text-red-600 px-3 py-1.5 rounded-full border border-red-100 hover:bg-red-50">
                        <IconTrash c="w-3 h-3"/> 이 결과 삭제
                      </button>
                      <button onClick={()=>setViewSaved(null)}
                        className="text-xs bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-1.5 rounded-full font-bold">
                        닫기
                      </button>
                    </div>
                  </div>
                </div>
              );
            })()}

            <h3 className="text-sm font-bold text-gray-700 mb-2 flex items-center">
              <IconLayers c="text-indigo-500 mr-2 w-4 h-4"/> 시간-온도 그래프
            </h3>

            {saved.length>0&&(
              <div className="mb-2 p-2 bg-gray-50 rounded-xl border border-gray-100">
                <p className="text-xs font-bold text-gray-500 mb-1.5 flex items-center justify-between">
                  <span>💾 저장된 결과 ({saved.length}개) — 클릭하면 상세보기</span>
                  <button onClick={()=>setSaved([])} className="text-red-400 hover:text-red-600 text-xs flex items-center gap-1">
                    <IconTrash c="w-3 h-3"/> 모두 삭제
                  </button>
                </p>
                <div className="space-y-1 max-h-24 overflow-y-auto scrollbar-hide">
                  {saved.map(s=>(
                    <div key={s.id}
                      onClick={()=>setViewSaved(s.id)}
                      className="flex items-center justify-between text-xs bg-white px-2 py-1.5 rounded-lg border border-gray-100 cursor-pointer hover:bg-indigo-50 hover:border-indigo-200 transition-colors group">
                      <span className="flex items-center gap-2">
                        <svg width="20" height="10" className="shrink-0">
                          <line x1="0" y1="5" x2="20" y2="5" stroke={s.c1} strokeWidth="2"/>
                        </svg>
                        <svg width="20" height="10" className="shrink-0">
                          <line x1="0" y1="5" x2="20" y2="5" stroke={s.c2} strokeWidth="2" strokeDasharray="4,2"/>
                        </svg>
                        <span className="text-gray-600 truncate max-w-[110px]">{s.label}</span>
                        <span className="text-indigo-400 text-[10px] group-hover:text-indigo-600 hidden sm:inline">👁 상세보기</span>
                      </span>
                      <button onClick={e=>{e.stopPropagation();setSaved(p=>p.filter(x=>x.id!==s.id));}}
                        className="text-red-300 hover:text-red-500 ml-1 shrink-0">✕</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div className="flex flex-1 min-h-[160px] gap-0">
              <div className="flex flex-col justify-between text-right pr-1.5 py-0.5 shrink-0" style={{width:'32px'}}>
                <span className="text-xs text-gray-500 font-semibold">90°C</span>
                <span className="text-xs text-gray-400">70°C</span>
                <span className="text-xs text-gray-400">50°C</span>
                <span className="text-xs text-gray-400">30°C</span>
                <span className="text-xs text-gray-500 font-semibold">20°C</span>
              </div>
              <div className="flex-1 relative border-l-2 border-b-2 border-gray-400 bg-gray-50 rounded-tr-lg overflow-hidden">
                <div className="absolute right-1 -bottom-5 text-xs text-gray-400">시간 →</div>
                <svg className="w-full h-full" viewBox={`0 0 ${maxT} 80`} preserveAspectRatio="none">
                  <line x1="0" y1="16" x2={maxT} y2="16" stroke="#e5e7eb" strokeDasharray="3"/>
                  <line x1="0" y1="32" x2={maxT} y2="32" stroke="#e5e7eb" strokeDasharray="3"/>
                  <line x1="0" y1="48" x2={maxT} y2="48" stroke="#e5e7eb" strokeDasharray="3"/>
                  <line x1="0" y1="64" x2={maxT} y2="64" stroke="#e5e7eb" strokeDasharray="3"/>
                  {saved.map(s=>(
                    <g key={s.id} opacity="0.5">
                      <polyline fill="none" stroke={s.c1} strokeWidth="1.5"
                        points={getPoints(s.data, 't1')}/>
                      <polyline fill="none" stroke={s.c2} strokeWidth="1.5" strokeDasharray="5,3"
                        points={getPoints(s.data, 't2')}/>
                    </g>
                  ))}
                  <polyline fill="none" stroke={MATS[mat1].color} strokeWidth="2.5"
                    points={getPoints(series, 't1')}/>
                  <polyline fill="none" stroke={MATS[mat2].color} strokeWidth="2.5" strokeDasharray="5,3"
                    points={getPoints(series, 't2')}/>
                </svg>
              </div>
            </div>
            <div className="text-right text-xs text-gray-400 mt-1 pr-1">→ 시간</div>

            <div className="flex flex-wrap justify-center gap-2 mt-2">
              {[{mat:mat1,mass:m1,lbl:'물질 A',dash:false},{mat:mat2,mass:m2,lbl:'물질 B',dash:true}].map(({mat,mass,lbl,dash})=>(
                <div key={lbl} className="flex items-center bg-gray-50 px-2.5 py-1 rounded-md border border-gray-100">
                  <svg width="20" height="10" className="mr-1.5">
                    <line x1="0" y1="5" x2="20" y2="5" stroke={MATS[mat].color} strokeWidth="2.5"
                      strokeDasharray={dash?'5,3':undefined}/>
                  </svg>
                  <span className="text-xs font-bold text-gray-700">{lbl}: {MATS[mat].name} ({mass}g)</span>
                </div>
              ))}
            </div>
            <div className="mt-2 p-2.5 bg-indigo-50 rounded-xl border border-indigo-100 text-xs text-indigo-800 leading-relaxed">
              💡 <strong>탐구 포인트:</strong> 기울기가 완만할수록 온도가 천천히 오릅니다 → 비열이 큰 물질입니다.<br/>
              조건을 바꾸고 <strong className="text-emerald-600">결과 저장</strong>을 눌러 여러 조건을 비교해 보세요!
            </div>
            <div className="mt-2">
              <InquiryCard qs={[
                '질량을 2배로 늘리면 온도 변화 속도는 어떻게 달라지나요?',
                '비열이 크면 같은 열을 받았을 때 온도 변화가 더 클까요, 작을까요?',
                '물이 냉각수나 찜질팩으로 쓰이는 이유를 비열과 연결해 설명해 보세요.',
              ]}/>
            </div>
          </div>
        </div>
      </div>
    );
  };

  /* ══════════════════════════════════════════════════════
     탭 2: 고체 열팽창 (바이메탈)
     ══════════════════════════════════════════════════════ */
  const SolidExpansionTab = () => {
    const [temp,setTemp]=useState(20);
    const [showP,setShowP]=useState(false);
    const bend=(temp-20)/80;
    const path=off=>{
      const ex=250-Math.abs(bend)*18;
      const ey=100+bend*65;
      return `M 50 ${100+off} Q 150 ${100+bend*22+off} ${ex} ${ey+off}`;
    };
    return (
      <div className="flex flex-col md:flex-row gap-4 fade-in">
        {/* 왼쪽: 바이메탈 실험 */}
        <div className="flex-1 bg-white p-4 rounded-2xl shadow-sm border border-emerald-100 flex flex-col items-center">
          <h3 className="text-base font-bold text-gray-700 mb-3 flex items-center">
            <IconLayers c="text-emerald-500 mr-2 w-5 h-5"/> 바이메탈 실험 (고체)
          </h3>
          <div className="relative w-full max-w-sm h-48 bg-gray-50 rounded-xl flex items-center justify-center overflow-hidden border border-gray-200 mb-2">
            {temp>20&&<div className="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-2 opacity-50">
              <div className="w-6 h-12 bg-orange-400 rounded-full blur-md animate-pulse"/>
              <div className="w-8 h-14 bg-red-500 rounded-full blur-md animate-pulse delay-75"/>
            </div>}
            {temp<20&&<div className="absolute inset-0 bg-blue-100/30 flex items-center justify-center">
              <span className="absolute top-5 text-3xl animate-pulse">❄️</span>
            </div>}
            <svg viewBox="0 0 300 200" className="z-10 w-full max-w-[300px]">
              <rect x="28" y="58" width="22" height="84" fill="#4B5563" rx="4"/>
              <path d={path(-11)} fill="none" stroke="#FBBF24" strokeWidth="20" strokeLinecap="round"/>
              <path d={path(11)}  fill="none" stroke="#94A3B8" strokeWidth="20" strokeLinecap="round"/>
            </svg>
            <div className="absolute top-2 right-2 bg-white/95 p-1.5 rounded-lg shadow-sm border text-xs text-gray-700">
              <div className="flex items-center mb-1"><div className="w-3 h-3 bg-yellow-400 mr-1.5 rounded-sm"/>황동 (팽창 큼)</div>
              <div className="flex items-center"><div className="w-3 h-3 bg-slate-400 mr-1.5 rounded-sm"/>철 (팽창 작음)</div>
            </div>
            {temp!==20&&<div className="absolute bottom-2 left-2 text-xs bg-white/90 px-2 py-1 rounded-lg border text-gray-600">
              {temp>20?'황동이 더 늘어나 → 철 쪽(아래)으로 휨':'황동이 더 줄어들어 → 위로 휨'}
            </div>}
          </div>
          <div className="w-full max-w-sm bg-emerald-50 rounded-xl px-4 py-2 border border-emerald-100 mb-2 text-xs flex justify-between items-center">
            <span className="text-emerald-700 font-bold">바이메탈 상태</span>
            <span className="text-emerald-800">{temp>20?'아래로 휨 🔽':temp<20?'위로 휨 🔼':'기본 상태 ↔'}</span>
          </div>
          <div className="w-full max-w-sm bg-gray-50 p-3 rounded-xl border flex flex-col items-center">
            <label className="text-gray-700 font-bold mb-1.5 text-sm">
              온도: <span className={temp>20?'text-red-500':temp<20?'text-blue-500':'text-gray-600'}>{temp}°C</span>
            </label>
            <input type="range" min="0" max="100" value={temp} onChange={e=>setTemp(Number(e.target.value))}
              className={`w-full ${temp>20?'accent-red-500':temp<20?'accent-blue-500':'accent-gray-400'}`}/>
            <div className="flex justify-between w-full text-xs text-gray-400 mt-1"><span>0°C</span><span>20°C</span><span>100°C</span></div>
            <button onClick={()=>{setTemp(20);setShowP(false);}}
              className="mt-2 flex items-center bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-1.5 rounded-full font-bold text-xs">
              <IconRotate c="mr-1.5 w-3.5 h-3.5"/> 초기화
            </button>
          </div>
        </div>
        {/* 오른쪽: 입자 운동 + 탐구 질문 */}
        <div className="flex-1 flex flex-col gap-3">
          <ParticlePanel temperature={temp} matterType="solid"
            accentCls="bg-emerald-500 hover:bg-emerald-600 text-white"
            emptyIcon={<IconLayers c="w-10 h-10 text-emerald-400 opacity-40"/>}
            show={showP} onToggle={()=>setShowP(p=>!p)}/>
          <InquiryCard qs={[
            '바이메탈이 온도에 따라 휘는 이유는 무엇인가요?',
            '두 금속의 열팽창 계수가 같다면 바이메탈은 어떻게 될까요?',
            '서모스탯(온도 조절 장치)에 바이메탈이 어떻게 활용될까요?',
          ]}/>
        </div>
      </div>
    );
  };

  /* ══════════════════════════════════════════════════════
     탭 3: 액체 열팽창 (플라스크)
     ══════════════════════════════════════════════════════ */
  const LiquidExpansionTab = () => {
    const [temp,setTemp]=useState(20);
    const [showP,setShowP]=useState(false);
    const diff=temp-20;
    const liqH=Math.max(5,50+diff*1.2);
    const tubeY=170-liqH;
    const liqC=temp>50?'#EF4444':temp<10?'#93C5FD':'#3B82F6';
    return (
      <div className="flex flex-col md:flex-row gap-4 fade-in">
        {/* 왼쪽: 플라스크 실험 */}
        <div className="flex-1 bg-white p-4 rounded-2xl shadow-sm border border-cyan-100 flex flex-col items-center">
          <h3 className="text-base font-bold text-gray-700 mb-3 flex items-center">
            <IconDrop c="text-cyan-500 mr-2 w-5 h-5"/> 플라스크 실험 (액체)
          </h3>
          <div className="relative w-full max-w-sm h-56 bg-gray-50 rounded-xl flex items-center justify-center overflow-hidden border border-gray-200 mb-2">
            {temp>20&&<div className="absolute bottom-5 left-1/2 -translate-x-1/2 opacity-50"><div className="w-8 h-12 bg-red-400 rounded-full blur-md animate-pulse"/></div>}
            {temp<20&&<div className="absolute bottom-5 left-1/2 -translate-x-1/2 text-2xl opacity-60 animate-pulse">🧊</div>}
            <svg width="100%" height="100%" viewBox="0 0 200 250" preserveAspectRatio="xMidYMid meet" className="z-10 max-w-[200px]">
              <rect x="90" y="20" width="20" height="150" fill="#F3F4F6" stroke="#D1D5DB" strokeWidth="2" rx="4"/>
              <rect x="94" y={tubeY} width="12" height={liqH} fill={liqC} style={{transition:'y .3s,height .3s,fill .3s'}}/>
              <circle cx="100" cy="192" r="45" fill={liqC} opacity="0.85" style={{transition:'fill .3s'}}/>
              <circle cx="100" cy="192" r="45" fill="none" stroke="#D1D5DB" strokeWidth="4"/>
              <line x1="115" y1="45"  x2="126" y2="45"  stroke="#9CA3AF" strokeWidth="2"/>
              <line x1="115" y1="82"  x2="121" y2="82"  stroke="#9CA3AF" strokeWidth="1"/>
              <line x1="115" y1="120" x2="126" y2="120" stroke="#9CA3AF" strokeWidth="2"/>
            </svg>
          </div>
          <div className="w-full max-w-sm bg-cyan-50 rounded-xl px-4 py-2 border border-cyan-100 mb-2 text-xs flex justify-between items-center">
            <span className="text-cyan-700 font-bold">액체 상태</span>
            <span className="text-cyan-800">{temp>20?'액면 상승 ↑':temp<20?'액면 하강 ↓':'기본 상태'}</span>
          </div>
          <div className="w-full max-w-sm bg-gray-50 p-3 rounded-xl border flex flex-col items-center">
            <label className="text-gray-700 font-bold mb-1.5 text-sm">
              온도: <span className={temp>20?'text-red-500':temp<20?'text-blue-500':'text-gray-600'}>{temp}°C</span>
            </label>
            <input type="range" min="0" max="100" value={temp} onChange={e=>setTemp(Number(e.target.value))}
              className={`w-full ${temp>20?'accent-red-500':temp<20?'accent-blue-500':'accent-gray-400'}`}/>
            <div className="flex justify-between w-full text-xs text-gray-400 mt-1"><span>0°C</span><span>20°C</span><span>100°C</span></div>
            <button onClick={()=>{setTemp(20);setShowP(false);}}
              className="mt-2 flex items-center bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-1.5 rounded-full font-bold text-xs">
              <IconRotate c="mr-1.5 w-3.5 h-3.5"/> 초기화
            </button>
          </div>
        </div>
        {/* 오른쪽: 입자 운동 + 탐구 질문 */}
        <div className="flex-1 flex flex-col gap-3">
          <ParticlePanel temperature={temp} matterType="liquid"
            accentCls="bg-cyan-500 hover:bg-cyan-600 text-white"
            emptyIcon={<IconDrop c="w-10 h-10 text-cyan-400 opacity-40"/>}
            show={showP} onToggle={()=>setShowP(p=>!p)}/>
          <InquiryCard qs={[
            '액체를 가열하면 관 속 액면이 올라가는 이유는 무엇인가요?',
            '고체와 액체 중 열팽창이 더 크게 나타나는 것은 어느 쪽인가요?',
            '온도계가 액체의 팽창을 이용한다면 어떤 원리인가요?',
          ]}/>
        </div>
      </div>
    );
  };

  /* ══════════════════════════════════════════════════════
     탭 4: 기체 열팽창 (풍선/페트병)
     ══════════════════════════════════════════════════════ */
  const GasExpansionTab = () => {

          opts:['두 금속의 색이 달라서','두 금속의 밀도가 달라서','두 금속의 열팽창 계수가 달라서','두 금속의 두께가 달라서'],

          ans:2,exp:'기체는 입자 간격이 매우 넓어 가장 크고, 액체, 고체 순으로 작아집니다.'},

    const reset=()=>{setAnswers({});setChecked(false);setOpenSec('sh');};

    const scoreCls=score>=10?'text-green-600 bg-green-50 border-green-200':
                   score>=7?'text-blue-600 bg-blue-50 border-blue-200':
                   score>=5?'text-yellow-600 bg-yellow-50 border-yellow-200':
                            'text-red-600 bg-red-50 border-red-200';
    const scoreMsg=score>=10?'훌륭해요! 🏆':score>=7?'잘했어요! 👍':score>=5?'조금 더 공부해요 📚':'다시 도전! 💪';

              <div key={sec.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

                      const isWrong=checked&&isAns&&ua!==q.ans;

                        <div key={q.id} className={`p-5 transition-colors ${isRight?'bg-green-50/50':isWrong?'bg-red-50/50':''}`}>

                              ${isRight?'bg-green-500 text-white':isWrong?'bg-red-500 text-white':isAns?'bg-violet-500 text-white':'bg-gray-200 text-gray-500'}`}>
                              {qi+1}
                            </span>
                            <p className="text-sm font-semibold text-gray-800 leading-relaxed">{q.q}</p>
                          </div>
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 ml-8">

                              let cls='bg-gray-50 border-gray-200 text-gray-700 hover:bg-violet-50 hover:border-violet-300';

                <div className="mt-3 grid grid-cols-4 gap-2 text-xs">
                  {SECS.map(sec=>(
                    <div key={sec.id} className="text-center">
                      <p>{sec.icon}</p>
                      <p className="font-bold">{sec.qs.filter(q=>answers[q.id]===q.ans).length}/{sec.qs.length}</p>
                      <p className="opacity-70 leading-tight">{sec.title.replace(' 실험','').replace(' 열팽창','')}</p>
                    </div>
                  ))}
                </div>
              </div>
              <button onClick={reset}
                className="px-10 py-3 rounded-full font-bold text-sm shadow-md bg-gray-600 hover:bg-gray-700 text-white hover:scale-105 transition-all flex items-center gap-2">
                <IconRotate c="w-4 h-4"/> 다시 풀기
              </button>
            </div>
          )}
        </div>
      </div>
    );
  };

  /* ══════════════════════════════════════════════════════
     탭 6: 실생활 퀴즈
     ══════════════════════════════════════════════════════ */
  const QuizTab = () => {
    const items=[
      {id:'ㄱ',text:'여름에 전깃줄을 설치할 때 느슨하게 설치한다.',
       ans:'expansion',exp:'여름 기온 상승 → 전깃줄(고체) 열팽창 → 겨울에 끊어지지 않도록 미리 여유를 줍니다.'},
      {id:'ㄴ',text:'자동차 엔진 냉각수로 물을 사용한다.',
       ans:'specificHeat',exp:'물은 비열(4.18 kJ/(kg·°C))이 커서 온도가 쉽게 오르지 않아 엔진 열을 효율적으로 흡수합니다.'},
      {id:'ㄷ',text:'찜질팩에 따뜻한 물을 넣어 사용한다.',
       ans:'specificHeat',exp:'물은 비열이 커서 열을 오래 저장하므로 오랫동안 따뜻함을 유지합니다.'},
      {id:'ㄹ',text:'교량(다리)에 신축 이음(이음매)을 설치한다.',
       ans:'expansion',exp:'더운 날 다리가 열팽창하여 파손되지 않도록 신축 이음에 빈틈을 둡니다.'},
      {id:'ㅁ',text:'우주복 내부에 물이 흐르는 관을 설치한다.',
       ans:'specificHeat',exp:'물의 큰 비열로 우주의 급격한 온도 변화에서도 체온을 일정하게 유지합니다.'},
      {id:'ㅂ',text:'외부 가스관의 중간을 ∩자 형태로 설치한다.',
       ans:'expansion',exp:'계절 온도 변화에 따른 열팽창·수축 시 파손되지 않도록 여유를 줍니다.'},
      {id:'ㅅ',text:'냉장고에 넣어 둔 페트병이 찌그러진다.',
       ans:'expansion',exp:'냉각 → 내부 기체 수축 → 내부 기압 감소 → 대기압에 눌려 찌그러집니다.'},
      {id:'ㅇ',text:'사막 지역은 낮과 밤의 일교차가 매우 크다.',
       ans:'specificHeat',exp:'모래의 비열(0.84)이 작아 낮에 빠르게 뜨거워지고 밤에 빠르게 식어 일교차가 큽니다.'},
    ];
    const [answers,setAnswers]=useState({});
    const [showRes,setShowRes]=useState(false);
    const score=showRes?items.filter(q=>answers[q.id]===q.ans).length:0;
    const allDone=Object.keys(answers).length===items.length;
    return (
      <div className="max-w-3xl mx-auto bg-white p-4 sm:p-6 rounded-3xl shadow-sm border border-purple-100 fade-in">
        <div className="flex items-center justify-between mb-4 pb-4 border-b border-gray-100">
          <h3 className="text-lg font-bold text-gray-800 flex items-center">
            <IconHelp c="text-purple-500 mr-2 w-6 h-6"/> 실생활 적용 퀴즈
          </h3>
          {showRes&&<div className={`px-4 py-1.5 rounded-full font-bold text-sm ${score>=6?'bg-green-100 text-green-700':score>=4?'bg-yellow-100 text-yellow-700':'bg-red-100 text-red-700'}`}>
            {score}/{items.length} 정답 {score>=6?'🏆':score>=4?'👍':'💪'}
          </div>}
        </div>
        <p className="text-gray-500 mb-5 text-xs text-center bg-purple-50 p-3 rounded-xl">
          각 사례가 <strong className="text-blue-600">비열</strong>과 <strong className="text-orange-600">열팽창</strong> 중 어느 원리인지 선택하세요. (총 {items.length}문항)
        </p>
        <div className="space-y-3 mb-6">
          {items.map(item=>{
            const correct=answers[item.id]===item.ans;
            return (
              <div key={item.id} className={`p-3.5 rounded-2xl border-2 transition-all
                ${showRes?(correct?'border-green-300 bg-green-50':'border-red-300 bg-red-50'):
                  (answers[item.id]?'border-purple-200 bg-white':'border-gray-100 bg-gray-50')}`}>
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2.5">
                  <p className="text-sm font-bold text-gray-700 flex-1 leading-relaxed">
                    <span className="text-purple-500 mr-1.5">{item.id}.</span>{item.text}
                  </p>
                  <div className="flex gap-2 shrink-0">
                    <button onClick={()=>{if(!showRes)setAnswers(p=>({...p,[item.id]:'specificHeat'}));}}
                      disabled={showRes}
                      className={`px-3.5 py-1.5 rounded-xl font-bold text-xs transition-all
                        ${answers[item.id]==='specificHeat'?'bg-blue-500 text-white shadow-md':'bg-white text-gray-500 border border-gray-300 hover:bg-blue-50'}
                        ${showRes&&item.ans==='specificHeat'?'ring-2 ring-blue-400 ring-offset-1':''}`}>
                      비열
                    </button>
                    <button onClick={()=>{if(!showRes)setAnswers(p=>({...p,[item.id]:'expansion'}));}}
                      disabled={showRes}
                      className={`px-3.5 py-1.5 rounded-xl font-bold text-xs transition-all
                        ${answers[item.id]==='expansion'?'bg-orange-500 text-white shadow-md':'bg-white text-gray-500 border border-gray-300 hover:bg-orange-50'}
                        ${showRes&&item.ans==='expansion'?'ring-2 ring-orange-400 ring-offset-1':''}`}>
                      열팽창
                    </button>
                  </div>
                </div>
                {showRes&&<div className="mt-2.5 pt-2.5 border-t border-gray-200/60 flex items-start fade-in">
                  {correct?<IconCheck c="w-4 h-4 text-green-600 mr-1.5 shrink-0"/>:<IconXCirc c="w-4 h-4 text-red-600 mr-1.5 shrink-0"/>}
                  <p className={`text-xs leading-relaxed ${correct?'text-green-800':'text-red-800'}`}>
                    {correct?'정답!':'오답 (정답: '+(item.ans==='specificHeat'?'비열':'열팽창')+')'}  — {item.exp}
                  </p>
                </div>}
              </div>
            );
          })}
        </div>
        <div className="flex flex-col items-center">
          {!showRes?(
            <>
              <button onClick={()=>setShowRes(true)} disabled={!allDone}
                className={`px-8 py-2.5 rounded-full font-bold text-sm shadow-md transition-all ${allDone?'bg-purple-600 hover:bg-purple-700 text-white hover:scale-105':'bg-gray-300 text-gray-400 cursor-not-allowed'}`}>
                결과 확인
              </button>
              {!allDone&&<p className="text-red-400 mt-2 text-xs">모든 항목을 선택해야 결과를 확인할 수 있습니다.</p>}
            </>
          ):(
            <button onClick={()=>{setAnswers({});setShowRes(false);}}
              className="px-8 py-2.5 rounded-full font-bold text-sm shadow-md bg-gray-600 hover:bg-gray-700 text-white hover:scale-105 transition-all">
              다시 풀기
            </button>
          )}
        </div>
      </div>

  /* ══════════════════════════════════════════════════════
     탭 7: 개념 정리
     ══════════════════════════════════════════════════════ */
  const SummaryTab = () => {
    const concepts=[
      {title:'비열 (Specific Heat Capacity)',icon:'🌡️',
       border:'border-blue-400',bg:'bg-blue-50',tc:'text-blue-700',
       def:'물질 1 kg을 1°C 높이는 데 필요한 열량',
       formula:'Q = m × c × ΔT',
       fDesc:'Q: 열량(kJ)  m: 질량(kg)  c: 비열(kJ/(kg·°C))  ΔT: 온도 변화(°C)',
       key:'비열이 클수록 → 같은 열을 받아도 온도 변화가 작다',
       data:[{k:'물',v:'4.18 kJ/(kg·°C)'},{k:'식용유',v:'2.0 kJ/(kg·°C)'},{k:'모래',v:'0.84 kJ/(kg·°C)'}],
       exs:['자동차 냉각수 → 물 사용','찜질팩 → 물 사용','해안 지방 일교차 작음','사막 일교차 큼'],
       explain:null},

       border:'border-orange-400',bg:'bg-orange-50',tc:'text-orange-700',
       def:'온도가 높아지면 물질의 부피가 늘어나는 현상',
       formula:null,
       fDesc:null,
       key:'기체 ≫ 액체 > 고체 순서로 열팽창이 크다',
       data:[{k:'기체',v:'가장 큼',sub:'입자 간격 매우 넓음'},{k:'액체',v:'중간',sub:'비교적 자유로움'},{k:'고체',v:'가장 작음',sub:'입자 결합 강함'}],
       exs:['교량 신축 이음','가스관 ∩자 설치','바이메탈 온도 조절','냉장고 속 페트병 찌그러짐'],
       explain:'온도가 오르면 입자들이 더 활발히 움직이며 서로 밀어내 입자 간격이 멀어집니다. 그래서 전체 부피가 커집니다(열팽창).'},
    ];
    return (
      <div className="max-w-3xl mx-auto fade-in">
        <h3 className="text-lg font-bold text-gray-800 mb-5 flex items-center">
          <IconBook c="text-indigo-500 mr-2 w-5 h-5"/> 핵심 개념 정리
        </h3>
        <div className="space-y-5 mb-6">
          {concepts.map(c=>(
            <div key={c.title} className={`bg-white rounded-2xl shadow-sm border-l-4 ${c.border} p-5`}>
              <h4 className={`text-base font-bold ${c.tc} mb-1`}>{c.icon} {c.title}</h4>
              <p className="text-gray-600 text-sm font-medium mb-3 pb-3 border-b border-gray-100">📌 정의: {c.def}</p>
              <div className={`${c.bg} rounded-xl p-3 mb-3`}>
                {c.formula
                  ? <><p className="font-bold text-gray-700 text-sm">{c.formula}</p>
                      <p className="text-gray-500 text-xs mt-0.5">{c.fDesc}</p></>
                  : <p className="text-gray-700 text-xs leading-relaxed">{c.explain}</p>}
              </div>
              <div className="mb-3">
                <p className="text-xs font-bold text-gray-500 mb-1.5">📋 주요 데이터</p>
                <div className="grid grid-cols-3 gap-2">
                  {c.data.map(d=>(
                    <div key={d.k} className="bg-gray-50 rounded-lg p-2 text-center border border-gray-100">
                      <p className="font-bold text-gray-700 text-xs">{d.k}</p>
                      <p className="text-indigo-600 text-xs mt-0.5">{d.v}</p>
                      {d.sub&&<p className="text-gray-400 text-xs">{d.sub}</p>}
                    </div>
                  ))}
                </div>
              </div>
              <div className="bg-yellow-50 rounded-xl p-2.5 mb-3 border border-yellow-100">
                <p className="text-yellow-700 text-xs"><strong>⭐ 핵심:</strong> {c.key}</p>
              </div>
              <div>
                <p className="text-xs font-bold text-gray-500 mb-1.5">🏙️ 실생활 예시</p>
                <div className="flex flex-wrap gap-1.5">
                  {c.exs.map((e,i)=><span key={i} className="bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded-full">{e}</span>)}
                </div>
              </div>
            </div>
          ))}
        </div>
        <div className="bg-indigo-50 rounded-2xl p-5 border border-indigo-100">
          <h4 className="text-indigo-700 font-bold text-sm mb-3">🔄 비열 vs 열팽창 한눈에 비교</h4>
          <div className="overflow-x-auto">
            <table className="w-full text-xs text-gray-700 border-collapse">
              <thead>
                <tr className="bg-indigo-100 text-left">
                  <th className="p-2 rounded-tl-lg">구분</th>
                  <th className="p-2 text-blue-700">비열</th>
                  <th className="p-2 text-orange-700 rounded-tr-lg">열팽창</th>
                </tr>
              </thead>
              <tbody>
                {[
                  ['정의','온도 변화에 대한 저항성','온도 상승에 따른 부피 증가'],
                  ['공식','Q = mcΔT','(중학교 1학년 범위 외)'],
                  ['단위','kJ/(kg·°C)','—'],
                  ['크기','물질마다 다름','기체 ≫ 액체 > 고체'],
                  ['핵심','비열 클수록 온도 변화 작음','입자 간격 멀어질수록 팽창'],
                  ['실생활','냉각수, 찜질팩, 해안 일교차','신축 이음, 바이메탈, 온도계'],

                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  };

  /* ══════════════════════════════════════════════════════
     메인 앱
     ══════════════════════════════════════════════════════ */
  function VirtualLab(){
    const [tab,setTab]=useState('specific-heat');
    const tabs=[
      {id:'specific-heat',   lbl:'비열 실험',   icon:<IconFlame  c="w-4 h-4 mr-1"/>},
      {id:'solid-expansion', lbl:'고체 열팽창', icon:<IconLayers c="w-4 h-4 mr-1"/>},
      {id:'liquid-expansion',lbl:'액체 열팽창', icon:<IconDrop   c="w-4 h-4 mr-1"/>},
      {id:'gas-expansion',   lbl:'기체 열팽창', icon:<IconWind   c="w-4 h-4 mr-1"/>},
      {id:'concept-check',   lbl:'탐구 문제',   icon:<IconPencil c="w-4 h-4 mr-1"/>},
      {id:'quiz',            lbl:'실생활 퀴즈', icon:<IconHelp   c="w-4 h-4 mr-1"/>},
      {id:'summary',         lbl:'개념 정리',   icon:<IconBook   c="w-4 h-4 mr-1"/>},
    ];
    return (
      <div className="min-h-screen bg-slate-100 p-2 sm:p-4 md:p-8 font-sans text-gray-800">

        <div className="max-w-5xl mx-auto">
          <header className="bg-white rounded-2xl p-4 sm:p-5 shadow-sm mb-5 border border-gray-100 flex items-center justify-between">
            <div>
              <h1 className="text-xl sm:text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">
                열과 우리 생활 가상실험실
              </h1>
              <p className="text-gray-400 mt-0.5 text-xs sm:text-sm">중학교 1학년 과학 — 비열과 열팽창</p>
            </div>
            <div className="hidden md:flex bg-indigo-50 p-3 rounded-xl border border-indigo-100">
              <IconFlame c="text-orange-400 w-7 h-7 float-anim"/>
            </div>
          </header>
          <nav className="flex space-x-1.5 mb-5 overflow-x-auto pb-2 scrollbar-hide">
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`flex items-center whitespace-nowrap px-3 sm:px-4 py-2 sm:py-2.5 rounded-xl font-bold transition-all text-xs sm:text-sm

                {t.icon}{t.lbl}

          <main>
            {tab==='specific-heat'   &&<SpecificHeatTab/>}

            {tab==='summary'         &&<SummaryTab/>}

          <footer className="mt-8 text-center text-xs text-gray-400 pb-4">
            중학교 1학년 과학 · 비열과 열팽창 가상실험실
          </footer>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<VirtualLab/>);
</script>
